<!DOCTYPE html>
<html lang="vi">
<head>
  <link rel="icon" href="favicon.png" type="image/png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini-Wordle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Mini Wordle</h1>
  <p class="note">
    Lưu ý: Không sử dụng danh từ thêm s/es. Ưu tiên sử dụng từ phổ thông.
  </p>
  <p id="msg"></p>

  <div id="board" aria-label="game board"></div>

  <div id="keyboard"></div>

  <div class="controls">
    <button id="newGame">Chơi lại</button>

    <button id="musicToggle" class="music-btn"> Bật nhạc </button>
  </div>

  <audio id="bgMusic" src="soundtrack.mp3" loop preload="auto"></audio>

  <script src="Wordle.js"></script>
  <script src="mainWordle.js"></script>

  <script>
    (function() {
      const audio = document.getElementById('bgMusic');
      const toggleBtn = document.getElementById('musicToggle');
      let isPlaying = false;

      audio.volume = 0.5;

      function playMusic() {
        audio.play().then(() => {
          isPlaying = true;
          toggleBtn.textContent = 'Nhạc : Bật';
        }).catch(err => {
          console.warn('Không thể tự động phát nhạc:', err);
          isPlaying = false;
          toggleBtn.textContent = 'Nhạc : Tắt';
        });
      }
      function pauseMusic() {
        audio.pause();
        isPlaying = false;
        toggleBtn.textContent = 'Nhạc : Tắt';
      }
      toggleBtn.addEventListener('click', () => {
        if (isPlaying) {
          pauseMusic();
        } else {
          playMusic();
        }
      });
    })();
  </script>
</body>
</html>
